<!DOCTYPE html>
<html>
<head>
    <title>Modifica Feedback</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="mb-4">Modifica Feedback</h2>

    <div class="card p-4 shadow-sm">

        <form method="post" enctype="multipart/form-data">

            <div class="mb-3">
                <label class="form-label">Disciplina</label>
                <input type="text" class="form-control" value="Quality" disabled>

                <input type="hidden" name="disciplina" value="Quality">
            </div>

            <div class="mb-3">
                <label class="form-label">Tipo</label>
                <select name="tipo" class="form-select">
                    <option {% if feedback[2]=='Bug' %}selected{% endif %}>Bug</option>
                    <option {% if feedback[2]=='Miglioramento' %}selected{% endif %}>Miglioramento</option>
                    <option {% if feedback[2]=='Richiesta' %}selected{% endif %}>Richiesta</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Titolo</label>
                <input type="text" name="titolo" class="form-control" value="{{ feedback[3] }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Descrizione</label>
                <textarea name="descrizione" class="form-control" rows="5">{{ feedback[4] }}</textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Priorità</label>
                <select name="priorita" class="form-select">
                    <option {% if feedback[5]=='Alta' %}selected{% endif %}>Alta</option>
                    <option {% if feedback[5]=='Media' %}selected{% endif %}>Media</option>
                    <option {% if feedback[5]=='Bassa' %}selected{% endif %}>Bassa</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Fonte</label>
                <input type="text" name="fonte" class="form-control" value="{{ feedback[6] }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Stato</label>
                <select name="stato" class="form-select">
                    <option {% if feedback[7]=='Nuovo' %}selected{% endif %}>Nuovo</option>
                    <option {% if feedback[7]=='In corso' %}selected{% endif %}>In corso</option>
                    <option {% if feedback[7]=='Risolto' %}selected{% endif %}>Risolto</option>
                </select>
            </div>

            {% if images %}
            <div class="mb-3">
                <label class="form-label">Immagini attuali</label><br>

                {% for img in images %}
                    <img src="{{ img }}" class="img-fluid mb-2 me-2" style="max-width:200px;">
                {% endfor %}

            </div>
            {% endif %}

            <div class="mb-3">
                <label class="form-label">Sostituisci immagine</label>
                <input type="file" name="image" class="form-control">
            </div>

            <button type="submit" class="btn btn-success">Salva modifiche</button>
            <a href="/" class="btn btn-secondary">Annulla</a>

        </form>

    </div>

</div>

</body>
</html>
