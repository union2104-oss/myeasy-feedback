
<!DOCTYPE html>
<html>
<head>
    <title>Edit Feedback</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="mb-4">Edit Feedback</h2>

    <div class="card p-4 shadow-sm">

        <form method="post" enctype="multipart/form-data">

            <div class="mb-3">
                <label class="form-label">Discipline</label>
                <input type="text" class="form-control" value="Quality" disabled>

                <input type="hidden" name="disciplina" value="Quality">
            </div>

            <div class="mb-3">
                <label class="form-label">Type</label>
                <select name="tipo" class="form-select">
                    <option {% if feedback[2]=='Bug' %}selected{% endif %}>Bug</option>
                    <option {% if feedback[2]=='Miglioramento' %}selected{% endif %}>Improvement</option>
                    <option {% if feedback[2]=='Richiesta' %}selected{% endif %}>Request</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Title</label>
                <input type="text" name="titolo" class="form-control" value="{{ feedback[3] }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="descrizione" class="form-control" rows="5">{{ feedback[4] }}</textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Priority</label>
                <select name="priorita" class="form-select">
                    <option {% if feedback[5]=='Alta' %}selected{% endif %}>High</option>
                    <option {% if feedback[5]=='Media' %}selected{% endif %}>Medium</option>
                    <option {% if feedback[5]=='Bassa' %}selected{% endif %}>Low</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Source</label>
                <input type="text" name="fonte" class="form-control" value="{{ feedback[6] }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Status</label>
                <select name="stato" class="form-select">
                    <option {% if feedback[7]=='Nuovo' %}selected{% endif %}>New</option>
                    <option {% if feedback[7]=='In corso' %}selected{% endif %}>In Progress</option>
                    <option {% if feedback[7]=='Risolto' %}selected{% endif %}>Resolved</option>
                </select>
            </div>

            {% if images %}
            <div class="mb-3">
                <label class="form-label">Current Images</label><br>

                {% for img in images %}
                    <div class="d-inline-block me-3 mb-3 text-center">
                        <img src="{{ img }}" class="img-fluid mb-1" style="max-width:200px;">

                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="delete_images" value="{{ img }}">
                            <label class="form-check-label">
                                Delete
                            </label>
                        </div>
                    </div>
                {% endfor %}

            </div>
            {% endif %}

            <div class="mb-3">
                <label class="form-label">Add Images</label>
                <input type="file" name="image" class="form-control" multiple accept="image/*">
            </div>

            <button type="submit" class="btn btn-success">Save Changes</button>
            <a href="/" class="btn btn-secondary">Cancel</a>

        </form>

    </div>

</div>

</body>
</html>
